name: release-baseline

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  release-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run check:release-baseline
